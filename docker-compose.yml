version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      # Optional: Mount the database if you want data persistence across container restarts
      - ./backend/civitas.db:/app/civitas.db
      - ./backend/SimulationHistory.db:/app/SimulationHistory.db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # These are used during the Vite build process
        VITE_API_URL: "http://localhost:8000/api"
        VITE_WS_URL: "ws://localhost:8000/ws"
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

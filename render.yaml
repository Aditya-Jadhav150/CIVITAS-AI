services:
  - type: web
    name: civitas-backend
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: ./backend
    # Optional: Render allows disk attachments, but free tier doesn't support them.
    # We will let SQLite run ephemerally for the hackathon (it resets on deploy/sleep).
    envVars:
      - key: GEMINI_API_KEY
        sync: false # Requires manual entry in the Render Dashboard

  - type: web
    name: civitas-frontend
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: VITE_API_URL
        sync: false # Requires manual entry in the Render Dashboard
      - key: VITE_WS_URL
        sync: false # Requires manual entry in the Render Dashboard
